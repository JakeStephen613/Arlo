services:
  - type: web
    name: arlo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"        # use prebuilt wheels (no source builds) — fast installs
      - key: ANTHROPIC_API_KEY
        sync: false          # paste in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ENV
        value: prod
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after first deploy
  - type: web
    name: arlo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
